<pre><code>  return &#123;

      &#125;
    &#125;,

    // 获取缓存数据

    &#125;,

    // 清除缓存数据

      localStorage.removeItem(`$&#123;cacheName&#125;-$&#123;key&#125;`);
    &#125;,

    // 检查缓存
    has: function (key) &#123;

  try &#123;
